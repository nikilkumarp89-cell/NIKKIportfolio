<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vite + React</title>
    <style>
      body{
        overflow-x: hidden;
       }
       #nikki{
        font-size: 25px;
       }

       @keyframes appear{
        from {
          opacity: 0;
          scale: 0.5;

        }
        to  
        {
          opacity: 1;
          scale: 1;
        }
       }
       #block{
        animation:appear 5s linear ;
        animation-timeline: view();
        animation-range: entry 0% cover 40%;
       }
        @keyframes appears{
        from {
          opacity: 0;
          transform: translatex(100px);

        }
        to  
        {
          opacity: 1;
          transform: translatex(0px);
        }
       }
       #block1{
        animation:appears 5s linear ;
        animation-timeline: view();
        animation-range: entry 0% cover 40%;
       }
        @keyframes appearss{
        from {
          opacity: 0;
         clip-path: inset(100% 100% 0 0);

        }
        to  
        {
          opacity: 1;
           clip-path: inset(100% 100% 0 0);
        }
       }
       #block2{
        animation:appearss 5s linear ;
        animation-timeline: view();
        animation-range: entry 0% cover 40%;
       }
       @keyframes appearses{
        from {
          opacity: 0;
          transform: translatex(-100px);

        }
        to  
        {
          opacity: 1;
          transform: translatex(0px);
        }
       }
       #block3{
        animation:appearses 5s linear ;
        animation-timeline: view();
        animation-range: entry 0% cover 40%;
       }
     
       
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
